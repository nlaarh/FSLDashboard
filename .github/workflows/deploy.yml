name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: fslapp-nyaaa
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build React frontend
      working-directory: frontend
      run: |
        npm ci
        npm run build

    - name: Copy frontend build to backend
      run: |
        rm -rf backend/static
        cp -r frontend/dist backend/static

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Python dependencies into package
      working-directory: backend
      run: |
        python3 --version
        python3 -m pip install --upgrade pip
        python3 -m pip install --target=.python_packages/lib/site-packages -r requirements.txt
        echo "Checking compiled extensions match Python 3.13:"
        find .python_packages -name "*.so" | head -5

    - name: Create deployment package
      working-directory: backend
      run: |
        zip -r ../deploy.zip \
          main.py app.py sf_client.py ops.py db.py \
          cache.py scorer.py scheduler.py simulator.py \
          gunicorn.conf.py startup.sh requirements.txt \
          static/ .python_packages/

    - name: Deploy to Azure via Kudu ZIP Deploy
      env:
        DEPLOY_USER: ${{ secrets.AZURE_DEPLOY_USER }}
        DEPLOY_PASS: ${{ secrets.AZURE_DEPLOY_PASS }}
      run: |
        echo "Deploying to ${{ env.AZURE_WEBAPP_NAME }}..."
        echo "machine ${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net" > /tmp/.netrc
        echo "login ${DEPLOY_USER}" >> /tmp/.netrc
        echo "password ${DEPLOY_PASS}" >> /tmp/.netrc
        chmod 600 /tmp/.netrc

        RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X POST \
          "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/zipdeploy?isAsync=true" \
          --netrc-file /tmp/.netrc \
          --data-binary @deploy.zip \
          -H "Content-Type: application/octet-stream" \
          --max-time 300)

        rm -f /tmp/.netrc

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | sed '$d')

        echo "HTTP Status: $HTTP_CODE"
        if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
          echo "Deployment accepted!"
        else
          echo "Deployment failed!"
          echo "$BODY"
          exit 1
        fi

    - name: Clean up stale Oryx artifacts
      env:
        DEPLOY_USER: ${{ secrets.AZURE_DEPLOY_USER }}
        DEPLOY_PASS: ${{ secrets.AZURE_DEPLOY_PASS }}
      run: |
        echo "machine ${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net" > /tmp/.netrc
        echo "login ${DEPLOY_USER}" >> /tmp/.netrc
        echo "password ${DEPLOY_PASS}" >> /tmp/.netrc
        chmod 600 /tmp/.netrc
        # Delete leftover Oryx build artifact that prevents container startup
        curl -s -X DELETE --netrc-file /tmp/.netrc \
          "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/vfs/site/wwwroot/output.tar.zst" \
          -H "If-Match: *" --max-time 30 || true
        curl -s -X DELETE --netrc-file /tmp/.netrc \
          "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/vfs/site/wwwroot/oryx-manifest.toml" \
          -H "If-Match: *" --max-time 30 || true
        rm -f /tmp/.netrc
        echo "Cleanup done"

    - name: Verify deployment
      run: |
        echo "Waiting 120 seconds for Azure to start the app..."
        sleep 120
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          --max-time 15 \
          "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/")
        echo "Health check: HTTP $STATUS"
        if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ] || [ "$STATUS" = "302" ]; then
          echo "App is live! (HTTP $STATUS)"
        else
          echo "Warning: App returned $STATUS (may still be starting)"
        fi
