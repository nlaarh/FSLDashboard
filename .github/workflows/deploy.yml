name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: fslapp-nyaaa
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build React frontend
      working-directory: frontend
      run: |
        npm ci
        npm run build

    - name: Copy frontend build to backend
      run: |
        rm -rf backend/static
        cp -r frontend/dist backend/static

    - name: Create deployment package
      working-directory: backend
      run: |
        zip -r ../deploy.zip \
          main.py app.py sf_client.py ops.py db.py \
          cache.py scorer.py scheduler.py simulator.py \
          gunicorn.conf.py startup.sh requirements.txt \
          static/

    - name: Deploy to Azure via Kudu ZIP Deploy
      env:
        DEPLOY_USER: ${{ secrets.AZURE_DEPLOY_USER }}
        DEPLOY_PASS: ${{ secrets.AZURE_DEPLOY_PASS }}
      run: |
        echo "Deploying to ${{ env.AZURE_WEBAPP_NAME }}..."
        # Write netrc to avoid shell escaping issues with $ in username
        echo "machine ${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net" > /tmp/.netrc
        echo "login ${DEPLOY_USER}" >> /tmp/.netrc
        echo "password ${DEPLOY_PASS}" >> /tmp/.netrc
        chmod 600 /tmp/.netrc

        RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X POST \
          "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/zipdeploy?isAsync=true" \
          --netrc-file /tmp/.netrc \
          --data-binary @deploy.zip \
          -H "Content-Type: application/octet-stream" \
          --max-time 300)

        rm -f /tmp/.netrc

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | sed '$d')

        echo "HTTP Status: $HTTP_CODE"
        if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
          echo "Deployment accepted! Azure is building and deploying..."
        else
          echo "Deployment failed!"
          echo "$BODY"
          exit 1
        fi

    - name: Verify deployment
      run: |
        echo "Waiting 60 seconds for Azure to build and start..."
        sleep 60
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          --max-time 15 \
          "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/")
        echo "Health check: HTTP $STATUS"
        # 200 = app works, 401/302 = app running but auth required (still success)
        if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ] || [ "$STATUS" = "302" ]; then
          echo "App is live! (HTTP $STATUS)"
        else
          echo "Warning: App returned $STATUS (may still be starting)"
        fi
